
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="dashboard-header">
        <h1>Task Dashboard</h1>
        <p>Manage and track your tasks efficiently</p>
        <button class="add-btn">Add Task +</button>
    </header>

    <section class="summary-container">
        <div class="card">Total Tasks: 128</div>
        <div class="card">In Progress: 24</div>
        <div class="card">Completed: 86</div>
        <div class="card">Overdue: 18</div>
    </section>

    <section class="task-list">
        <h2>Recent Task</h2>
        <table>
            <thead>
                <tr>
                    <th>TASK NAME</th>
                    <th>DUE DATE</th>
                    <th>PRIORITY</th>
                    <th>STATUS</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Redesign Mobile App</td>
                    <td>15 Jun, 2026</td>
                    <td><span class="badge-priority">High</span></td>
                    <td><span class="badge-status">In Progress</span></td>
                    <td>...</td>
                </tr>
            </tbody>
        </table>
    </section>

</body>
</html>
